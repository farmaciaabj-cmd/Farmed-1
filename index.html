<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmed - Gestão de Acolhidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --cor-azul: #009cd9;
            --bg: #121824; 
            --card-bg: #1e293b;
            --texto-p: #f8fafc;
            --texto-s: #94a3b8;
            --borda: #334155;
            --shadow-in: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05);
            --shadow-out: 5px 5px 15px rgba(0,0,0,0.4), -2px -2px 10px rgba(255,255,255,0.05);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg);
            color: var(--texto-p);
            padding: 25px; 
            min-height: 100vh;
        }
        
        .dashboard { max-width: 800px; margin: 0 auto; }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #fff 0%, var(--cor-azul) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        
        .action-bar { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; }
        
        .search-input { 
            flex: 1;
            padding: 14px 20px; 
            border-radius: 16px; 
            border: 1px solid var(--borda); 
            background: #151f32;
            color: white;
            outline: none; 
            font-size: 16px;
            box-shadow: var(--shadow-in);
            transition: all 0.3s ease;
        }
        .search-input:focus { border-color: var(--cor-azul); }
        .search-input::placeholder { color: #64748b; }
        
        .add-btn { 
            background: linear-gradient(135deg, #00b4ff, var(--cor-azul));
            color: white; 
            border: none; 
            padding: 14px 25px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 15px;
            box-shadow: var(--shadow-out);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            white-space: nowrap;
        }
        .add-btn:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-in);
        }

        .upload-label {
            background: #1e293b;
            color: var(--texto-s);
            border: 1px dashed var(--borda);
            padding: 14px 20px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-out);
        }
        .upload-label:hover {
            border-color: var(--cor-azul);
            color: white;
            background: #151f32;
        }
        
        .icon-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .icon-item { 
            background: var(--card-bg);
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: var(--shadow-out);
            transition: all 0.2s ease; 
            flex: 1;
            min-width: 140px;
        }
        .icon-item:hover { 
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.5), 0 0 10px rgba(0,156,217,0.2);
            border-color: rgba(0,156,217,0.3);
        }
        .icon-item:active {
            transform: translateY(1px);
            box-shadow: var(--shadow-in);
        }
        .icon-item span { display: block; font-weight: 600; font-size: 14px; margin-top: 8px; color: var(--texto-p); }
        
        .time-selector { 
            display: flex;
            gap: 10px; 
            margin-bottom: 25px; 
            background: #151f32; 
            padding: 6px; 
            border-radius: 16px;
            box-shadow: var(--shadow-in);
        }
        .time-btn { 
            flex: 1;
            padding: 12px; 
            border: none;
            background: transparent; 
            color: var(--texto-s);
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 15px;
            transition: all 0.2s ease;
        }
        .time-btn.active { 
            background: var(--card-bg);
            color: #fff; 
            box-shadow: var(--shadow-out);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .record-card { 
            background: var(--card-bg);
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 14px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 5px solid var(--cor-azul); 
            box-shadow: var(--shadow-out);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .record-card strong { font-size: 18px; color: #fff; letter-spacing: -0.3px; }
        .record-card small { color: var(--texto-s); font-size: 14px; display: inline-block; margin-top: 4px; }
        
        .actions-wrapper { display: flex; align-items: center; gap: 10px; }
        .btn-action { 
            border: none;
            background: #151f32; 
            padding: 10px 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: var(--shadow-out);
            transition: all 0.1s ease; 
        }
        .btn-action:active { transform: scale(0.92); box-shadow: var(--shadow-in); }
        
        .btn-bula { background: #0f3652; color: #38bdf8; font-weight: 700; border: 1px solid rgba(56,189,248,0.2); }
        .btn-bula:hover { background: var(--cor-azul); color: white; }
        .btn-edit { background: #452b14; color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
        .btn-edit:hover { background: #d97706; color: white; }
        .btn-delete { background: #4c1d1d; color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
        .btn-delete:hover { background: #dc2626; color: white; }

        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 10, 15, 0.85); z-index: 9999; justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: var(--card-bg);
            padding: 30px; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 420px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            border: 1px solid var(--borda);
        }
        .modal-content h2 { margin-bottom: 15px; font-weight: 700; font-size: 22px; letter-spacing: -0.5px; }
        .modal-content label { font-size: 12px; color: var(--texto-s); font-weight: 600; text-transform: uppercase; }
        .modal-content input, .modal-content select { 
            width: 100%;
            margin: 8px 0 14px 0; 
            padding: 12px 16px; 
            border: 1px solid var(--borda); 
            border-radius: 12px; 
            background: #151f32; 
            color: white;
            outline: none;
            box-shadow: var(--shadow-in);
        }
        .modal-content input:focus, .modal-content select:focus { border-color: var(--cor-azul); }

        .modal-grande { max-width: 950px; width: 95%; height: 85vh; display: flex; flex-direction: column; }
        .agenda-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--borda); flex-shrink: 0; }
        .agenda-body { display: flex; flex: 1; gap: 20px; margin-top: 15px; overflow: hidden; min-height: 0; }
        
        .col-esquerda { flex: 1; background: #151f32; padding: 15px; border-radius: 18px; display: flex; flex-direction: column; min-width: 320px; box-shadow: var(--shadow-in); }
        .col-esquerda-scroll { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        
        .cal-controles { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: var(--cor-azul); }
        .cal-seta { cursor: pointer; font-size: 18px; padding: 5px 10px; user-select: none; }
        .cal-dias-semana { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: var(--texto-s); font-weight: bold; margin-bottom: 10px; }
        .cal-grade-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex: 1; align-content: start; }
        .cal-dia { background: var(--card-bg); border-radius: 50%; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 14px; cursor: pointer; position: relative; font-weight: 500; color: #fff; box-shadow: var(--shadow-out); }
        .cal-dia:hover { background: #243147; }
        .cal-dia.outro-mes { color: #475569; cursor: default; background: none; box-shadow: none; }
        .cal-dia.outro-mes:hover { background: none; }
        .cal-dia.selecionado { background: var(--cor-azul) !important; color: white !important; box-shadow: 0 0 12px var(--cor-azul); }
        .cal-dia .marcador { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; position: absolute; bottom: 4px; }
        .cal-dia.selecionado .marcador { background: #fff; }
        
        .card-paciente-link { background: var(--card-bg); padding: 14px 18px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; box-shadow: var(--shadow-out); font-weight: 600; color: var(--texto-p); transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: center; }
        .card-paciente-link:hover { background: #243147; border-color: rgba(0,156,217,0.2); }
        .card-paciente-link.selecionado { background: var(--cor-azul); color: white; box-shadow: 0 0 10px rgba(0,156,217,0.4); }
        
        .col-direita { flex: 1.2; background: #151f32; border-radius: 18px; padding: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-in); }
        .data-selecionada-titulo { font-size: 16px; color: var(--cor-azul); font-weight: bold; margin-bottom: 15px; text-align: center; border-bottom: 2px solid var(--borda); padding-bottom: 8px; flex-shrink: 0; }
        .container-scroll-pacientes { flex: 1; overflow-y: auto; padding-right: 5px; }
        
        .drive-frame-container { width: 100%; height: 100%; border-radius: 12px; overflow: hidden; background: #0b0f19; border: 1px solid var(--borda); box-shadow: var(--shadow-in); }
        .drive-frame-container iframe { width: 100%; height: 100%; border: none; }

        .card-saida-paciente { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow-out); border-left: 5px solid #22c55e; border-top: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center; }
        .card-saida-conteudo { flex: 1; }
        .card-saida-paciente h4 { color: #fff; margin-bottom: 5px; font-size: 15px; }
        .card-saida-paciente p { font-size: 13px; color: var(--texto-s); margin-bottom: 8px; }
        .link-drive { display: inline-block; background: #0f3652; color: #38bdf8; text-decoration: none; font-size: 12px; padding: 6px 12px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(56,189,248,0.2); }
        .link-drive:hover { background: var(--cor-azul); color: white; }

        .btn-plus { background: var(--cor-azul); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-out); }
        .btn-plus:active { transform: scale(0.92); }
    </style>
</head>
<body>
   
<div class="dashboard">
    <div style="text-align: center; margin-bottom: 10px; margin-top: 10px;">
        <img src="https://lh3.googleusercontent.com/d/1BIAepPrrliHft2rnjcCdQxAWu0icfL2y" alt="Logo Farmed" style="max-width: 150px; height: auto; border-radius: 12px; box-shadow: var(--shadow-out);">
    </div>

    <h1 style="text-align: center;">Farmed</h1>
    
    <div class="action-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar acolhido..." onkeyup="renderizar()">
        <label for="importPlanilha" class="upload-label">📁 Importar</label>
        <input type="file" id="importPlanilha" accept=".xlsx, .xls, .csv" style="display: none;" onchange="importarPlanilhaAcolhidos(event)">
        <button class="add-btn" onclick="abrirCadastroNovos()">+ Cadastrar</button>
    </div>

    <div class="icon-grid">
        <div class="icon-item" onclick="abrirCalendarioGrande()">📅<span>Agenda / Saídas</span></div>
        <div class="icon-item" onclick="abrirGerenciadorReceitas()">📄✍️<span>Gerenciar Receitas</span></div>
    </div>

    <div class="time-selector">
        <button class="time-btn active" onclick="filtrar('07h', this)">07h</button>
        <button class="time-btn" onclick="filtrar('15h', this)">15h</button>
        <button class="time-btn" onclick="filtrar('19h', this)">19h</button>
        <button class="time-btn" onclick="filtrar('23h', this)">23h</button>
    </div>

    <div id="lista-registros">Carregando dados...</div>
</div>

<div id="modalCadastro" class="modal">
    <div class="modal-content">
        <h2 id="modalTitulo">Novo Acolhido</h2>
        <input type="hidden" id="editId">
        
        <label>Nome do Acolhido</label>
        <input type="text" id="inpNome" placeholder="Ex: Michael">

        <label>CPF</label>
        <input type="text" id="inpCpf" placeholder="Ex: 000.000.000-00">
        
        <label>Medicamento / Dosagem</label>
        <input type="text" id="inpMed" placeholder="Ex: Dipirona">
        
        <label>Horário fixo</label>
        <select id="inpHora">
            <option value="07h">07h</option>
            <option value="15h">15h</option>
            <option value="19h">19h</option>
            <option value="23h">23h</option>
        </select>

        <label>Link ou ID da Pasta do Google Drive</label>
        <input type="text" id="inpDrive" placeholder="Cole o link ou ID da pasta do paciente">
        
        <button onclick="salvar()" style="width:100%; padding:14px; background:linear-gradient(135deg, #00b4ff, var(--cor-azul)); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:bold; font-size:15px; box-shadow: var(--shadow-out); margin-top:5px;">Salvar Alterações</button>
        <button onclick="fechar('modalCadastro')" style="width:100%; padding:12px; margin-top:10px; border:none; background:#151f32; color:var(--texto-s); border-radius:12px; cursor:pointer; font-weight:600;">Fechar</button>
    </div>
</div>

<div id="modalCalendario" class="modal">
    <div class="modal-content modal-grande">
        <div class="agenda-header">
            <h2>Agenda Profissional - Saídas</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="btn-plus" onclick="abrirModalNovaSaida()" title="Agendar Nova Saída">+</button>
                <button onclick="fechar('modalCalendario')" style="border:none; background:#151f32; color:var(--texto-s); padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:bold;">Sair</button>
            </div>
        </div>
        
        <div class="agenda-body">
            <div class="col-esquerda">
                <div class="cal-controles">
                    <span class="cal-seta" onclick="mudarMes(-1)"><</span>
                    <span id="calMesAno">...</span>
                    <span class="cal-seta" onclick="mudarMes(1)">></span>
                </div>
                <div class="cal-dias-semana">
                    <div>dom.</div><div>seg.</div><div>ter.</div><div>qua.</div><div>qui.</div><div>sex.</div><div>sáb.</div>
                </div>
                <div class="cal-grade-dias" id="calGradeDias"></div>
            </div>
            
            <div class="col-direita">
                <div class="data-selecionada-titulo" id="dataSelecionadaTitulo">Carregando...</div>
                <div class="container-scroll-pacientes" id="listaPacientesAgendados"></div>
            </div>
        </div>
    </div>
</div>

<div id="modalReceitas" class="modal">
    <div class="modal-content modal-grande">
        <div class="agenda-header">
            <h2>Central de Receitas Médicas</h2>
            <button onclick="fechar('modalReceitas')" style="border:none; background:#151f32; color:var(--texto-s); padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:bold;">Sair</button>
        </div>
        
        <div class="agenda-body">
            <div class="col-esquerda">
                <div style="font-size: 14px; font-weight: bold; color: var(--cor-azul); margin-bottom: 5px;">ACOLHIDOS REGISTRADOS</div>
                <div class="col-esquerda-scroll" id="listaNomesReceitas"></div>
            </div>
            
            <div class="col-direita">
                <div class="data-selecionada-titulo" id="nomeAcolhidoTitulo">Selecione um acolhido para inspecionar as pastas</div>
                <div class="container-scroll-pacientes" style="padding: 0;">
                    <div class="drive-frame-container" id="driveContainer">
                        <iframe id="driveIframe" src="https://drive.google.com/embeddedfolderview?id=1kGWG5rLmVBET55jxG9kPxGw2GWZv5PGf#grid"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modalNovaSaida" class="modal">
    <div class="modal-content" style="border: 1px solid var(--cor-azul); z-index: 100000;">
        <h2 id="modalSaidaTitulo">Agendar Renovação/Saída</h2>
        <input type="hidden" id="editSaidaId">
        
        <label style="margin-top: 10px; display:block;">Selecione o Acolhido:</label>
        <select id="saidaNomeSelect"></select>
        
        <label style="margin-top: 5px; display:block;">Link da Receita (Drive):</label>
        <input type="text" id="saidaLinks" placeholder="https://drive.google.com/...">
        
        <label style="margin-top: 5px; display:block;">Data da Renovação/Saída:</label>
        <input type="date" id="saidaData">
        
        <button style="background: linear-gradient(135deg, #00b4ff, var(--cor-azul)); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; box-shadow: var(--shadow-out);" onclick="salvarSaida()">Confirmar Agendamento</button>
        <button onclick="fechar('modalNovaSaida')" style="width:100%; border:none; background:none; color:var(--texto-s); margin-top:10px; cursor:pointer; font-weight:600;">Voltar</button>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
        'https://ybihimgrifabbeytgfxf.supabase.co', 
        'sb_publishable_myxtiNyXK3e97sbmnGJYGQ_yE9mHa8h'
    );

    let registros = [];
    let saidas = [];
    let horaAtual = "07h";
    
    let dataAtual = new Date();
    let dataSelecionada = new Date();

    const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const diasSemanaNomes = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

    window.prepararEdicaoSaida = function(id) {
        const item = saidas.find(s => String(s.id) === String(id));
        if (!item) {
            console.error("Agendamento não encontrado para o ID:", id);
            return;
        }

        abrirModalNovaSaida(); 

        document.getElementById('modalSaidaTitulo').innerText = "Editar Renovação/Saída";
        document.getElementById('editSaidaId').value = String(item.id);
        document.getElementById('saidaNomeSelect').value = item.nome || "";
        document.getElementById('saidaLinks').value = item.links || "";
        document.getElementById('saidaData').value = item.data || "";
    };

    window.salvarSaida = async function() {
        const id = document.getElementById('editSaidaId').value;
        const nome = document.getElementById('saidaNomeSelect').value;
        const links = document.getElementById('saidaLinks').value;
        const data = document.getElementById('saidaData').value;
        
        if(!nome || nome === "Nenhum acolhido cadastrado" || !data) {
            return alert("Por favor, preencha todos os dados!");
        }
        
        const dados = { nome, links, data };

        if (id && id.trim() !== "") {
            const idTratado = isNaN(id) ? id : Number(id);
            const { error } = await supabaseClient.from('calendario').update(dados).eq('id', idTratado);
            if (!error) { 
                fechar('modalNovaSaida'); 
                await carregar();
            } else { 
                alert("Erro ao editar agendamento: " + error.message);
            }
        } else {
            const { error } = await supabaseClient.from('calendario').insert([dados]);
            if (!error) { 
                fechar('modalNovaSaida');
                await carregar();
            } else { 
                alert("Erro ao agendar: " + error.message);
            }
        }
    };

    window.excluirSaida = async function(id, nome) {
        if (confirm(`Tem certeza de que deseja remover o agendamento de "${nome}"?`)) {
            const idTratado = isNaN(id) ? id : Number(id);
            const { error } = await supabaseClient.from('calendario').delete().eq('id', idTratado);
            if (!error) { 
                await carregar();
            } else { 
                alert("Erro ao excluir agendamento: " + error.message);
            }
        }
    };

    function extrairIdDrive(input) {
        if (!input) return "";
        const match = input.match(/folders\/([a-zA-Z0-9-_]+)/);
        return match ? match[1] : input.trim();
    }

    async function carregar() {
        try {
            const respPacientes = await supabaseClient.from('pacientes').select('*');
            if (respPacientes.data) { 
                registros = respPacientes.data; 
                renderizar(); 
            }

            const respSaidas = await supabaseClient.from('calendario').select('*');
            if (respSaidas.data) { 
                saidas = respSaidas.data.map(item => {
                    return {
                        id: item.id !== undefined ? item.id : (item.Id !== undefined ? item.Id : item.ID),
                        nome: item.nome || item.Nome || "",
                        links: item.links || item.Links || "",
                        data: item.data || item.Data || ""
                    };
                });
            } else if (respSaidas.error) {
                console.error("Erro ao buscar calendário:", respSaidas.error.message);
            }
            
            if(document.getElementById('modalCalendario').style.display === 'flex') { 
                gerarCalendario();
                renderizarPacientesDoDia(); 
            }
            if(document.getElementById('modalReceitas').style.display === 'flex') { 
                gerarListaAcolhidosReceitas();
            }
        } catch (err) {
            console.error("Erro crítico na comunicação com o Supabase:", err);
        }
    }

    function abrirCadastroNovos() {
        document.getElementById('modalTitulo').innerText = "Novo Acolhido";
        document.getElementById('editId').value = "";
        document.getElementById('inpNome').value = "";
        document.getElementById('inpCpf').value = ""; 
        document.getElementById('inpMed').value = "";
        document.getElementById('inpDrive').value = "";
        document.getElementById('inpHora').value = horaAtual;
        abrir('modalCadastro');
    }

    function prepararEdicao(id) {
        const item = registros.find(r => r.id === id);
        if (!item) return;
        document.getElementById('modalTitulo').innerText = "Editar Cadastro";
        document.getElementById('editId').value = item.id;
        document.getElementById('inpNome').value = item.nome;
        document.getElementById('inpCpf').value = item.cpf || "";
        document.getElementById('inpMed').value = item.medicamento || "";
        document.getElementById('inpDrive').value = item.links || ""; 
        document.getElementById('inpHora').value = item.hora;
        abrir('modalCadastro');
    }

    async function salvar() {
        const id = document.getElementById('editId').value;
        const nome = document.getElementById('inpNome').value.trim();
        const cpf = document.getElementById('inpCpf').value.trim(); 
        const med = document.getElementById('inpMed').value.trim();
        const hora = document.getElementById('inpHora').value;
        const driveRaw = document.getElementById('inpDrive').value;
        const linkLimpo = extrairIdDrive(driveRaw);

        if (!nome) return alert("Por favor, preencha o nome!");
        const dados = { nome, cpf, medicamento: med, hora, links: linkLimpo };
        if (id) {
            const { error } = await supabaseClient.from('pacientes').update(dados).eq('id', id);
            if (!error) { fechar('modalCadastro'); carregar(); }
            else { alert("Erro ao editar: " + error.message); }
        } else {
            const { error } = await supabaseClient.from('pacientes').insert([dados]);
            if (!error) { fechar('modalCadastro'); carregar(); }
            else { alert("Erro ao cadastrar: " + error.message); }
        }
    }

    function importarPlanilhaAcolhidos(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            
            const primeiraAba = workbook.SheetNames[0];
            const planilhaJson = XLSX.utils.sheet_to_json(workbook.Sheets[primeiraAba]);
            if (planilhaJson.length === 0) {
                return alert("A planilha está vazia!");
            }

            function formatarDataParaSupabase(dataRaw) {
                if (!dataRaw) return null;
                const dataString = String(dataRaw).trim();
                if (/^\d{4}-\d{2}-\d{2}$/.test(dataString)) return dataString;
                const partes = dataString.split(/[\/\-]/);
                if (partes.length === 3) {
                    if (partes[0].length <= 2 && partes[2].length === 4) {
                        const dia = partes[0].padStart(2, '0');
                        const mes = partes[1].padStart(2, '0');
                        const ano = partes[2];
                        return `${ano}-${mes}-${dia}`;
                    }
                }
                return dataString;
            }

            function tratarHorario(horaRaw) {
                if (!horaRaw) return "07h"; 
                let h = String(horaRaw).trim().toLowerCase();
                if (/^\d+$/.test(h)) {
                    h = h.padStart(2, '0') + "h";
                }
                if (h.includes(':')) {
                    h = h.split(':')[0].padStart(2, '0') + "h";
                }
                if (/^\d+h$/.test(h)) {
                    h = h.padStart(3, '0');
                }
                const horariosValidos = ["07h", "15h", "19h", "23h"];
                return horariosValidos.includes(h) ? h : "07h";
            }

            const arrayParaSalvar = planilhaJson.map(linha => {
                const linkTratado = linha.links ? extrairIdDrive(String(linha.links)) : "";
                const dataTratada = formatarDataParaSupabase(linha["data de acolhimento"]);
                const horaTratada = tratarHorario(linha.hora);
                
                return {
                    nome: linha.nomes ? String(linha.nomes).trim() : "Sem Nome",
                    cpf: linha.cpf ? String(linha.cpf).trim() : "",
                    medicamento: linha.medicamento ? String(linha.medicamento).trim() : "",
                    data_acolhimento: dataTratada,
                    links: linkTratado,
                    hora: horaTratada 
                };
            });

            if (confirm(`Deseja importar todos os ${arrayParaSalvar.length} acolhidos da planilha?`)) {
                const { error } = await supabaseClient.from('pacientes').insert(arrayParaSalvar);
                if (!error) {
                    alert("Todos os pacientes foram importados com sucesso!");
                    event.target.value = ""; 
                    carregar();
                } else {
                    alert("Erro ao importar lote para o Supabase: " + error.message);
                }
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function abrirModalNovaSaida() {
        document.getElementById('modalSaidaTitulo').innerText = "Agendar Renovação/Saída";
        document.getElementById('editSaidaId').value = "";
        document.getElementById('saidaLinks').value = "";
        document.getElementById('saidaData').value = "";

        const select = document.getElementById('saidaNomeSelect');
        select.innerHTML = '';
        const nomesUnicos = [...new Set(registros.map(r => r.nome))].sort();
        if(nomesUnicos.length === 0) {
            const opt = document.createElement('option');
            opt.innerText = "Nenhum acolhido cadastrado"; select.appendChild(opt);
        } else {
            nomesUnicos.forEach(nome => {
                const opt = document.createElement('option'); opt.value = nome; opt.innerText = nome; select.appendChild(opt);
            });
        }
        abrir('modalNovaSaida');
    }

    function renderizar() {
        const termo = document.getElementById('searchInput').value.toLowerCase();
        const lista = document.getElementById('lista-registros');
        if (!lista) return;
        
        let filtrados = registros.filter(r => r.hora === horaAtual && (r.nome || "").toLowerCase().includes(termo));
        filtrados.sort((a, b) => (a.nome || "").localeCompare(b.nome || "", 'pt', { sensitivity: 'base' }));
        lista.innerHTML = filtrados.map(r => `
            <div class="record-card">
                <div>
                    <strong>${r.nome}</strong>
                    ${r.cpf ? `<br><small style="color: var(--cor-azul)">CPF: ${r.cpf}</small>` : ''}
                    <br><small>${r.medicamento || 'Sem medicação definida'}</small>
                </div>
                <div class="actions-wrapper">
                    <button class="btn-action btn-bula" onclick="abrirGoogle('${r.medicamento}')" title="Ver Bula">Bula</button>
                    <button class="btn-action btn-edit" onclick="prepararEdicao(${r.id})" title="Editar Informações">✏️</button>
                    <button class="btn-action btn-delete" onclick="excluirRegistro(${r.id}, '${r.nome}')" title="Excluir do Sistema">🗑️</button>
                </div>
            </div>
        `).join('') || "<p style='text-align:center; color:#64748b; padding:20px;'>Nenhum acolhido registrado.</p>";
    }

    function abrirGerenciadorReceitas() {
        abrir('modalReceitas');
        gerarListaAcolhidosReceitas();
    }

    function gerarListaAcolhidosReceitas() {
        const container = document.getElementById('listaNomesReceitas');
        let acolhidosOrdenados = [...registros];
        acolhidosOrdenados.sort((a, b) => (a.nome || "").localeCompare(b.nome || "", 'pt', { sensitivity: 'base' }));
        if(acolhidosOrdenados.length === 0) {
            container.innerHTML = "<p style='color:#64748b; text-align:center; font-size:13px;'>Nenhum acolhido.</p>";
            return;
        }

        container.innerHTML = acolhidosOrdenados.map(p => `
            <div class="card-paciente-link" id="rec-card-${p.id}" onclick="selecionarAcolhidoParaDrive(${p.id}, '${p.nome.replace(/'/g, "\\'")}')">
                <span>👤 ${p.nome}</span>
                <span style="font-size: 11px; color: var(--cor-azul);">Ver Pasta ➔</span>
            </div>
        `).join('');
    }

    function selecionarAcolhidoParaDrive(id, nomeAcolhido) {
        document.querySelectorAll('.card-paciente-link').forEach(c => c.classList.remove('selecionado'));
        const cardSelecionado = document.getElementById(`rec-card-${id}`);
        if(cardSelecionado) cardSelecionado.classList.add('selecionado');

        const item = registros.find(r => r.id === id);
        if(!item) return;

        document.getElementById('nomeAcolhidoTitulo').innerText = `Acolhido: ${item.nome}`;
        const iframe = document.getElementById('driveIframe');
        const pastaRaizPadrao = "1kGWG5rLmVBET55jxG9kPxGw2GWZv5PGf"; 
        
        const eventoCalendario = saidas.filter(s => s.nome === nomeAcolhido && s.links).pop();
        let linkFinal = "";

        if (eventoCalendario && eventoCalendario.links) {
            linkFinal = eventoCalendario.links;
        } else if (item.links) { 
            linkFinal = item.links;
        }

        const idPastaDesejada = linkFinal ? extrairIdDrive(linkFinal) : pastaRaizPadrao;
        iframe.src = `https://drive.google.com/embeddedfolderview?id=${idPastaDesejada}&hl=pt-BR#grid`;
    }

    function abrirCalendarioGrande() { abrir('modalCalendario'); gerarCalendario(); renderizarPacientesDoDia(); }
    function mudarMes(direcao) { dataAtual.setMonth(dataAtual.getMonth() + direcao); gerarCalendario(); }
    function selecionarDia(ano, mes, dia) { dataSelecionada = new Date(ano, mes, dia); gerarCalendario(); renderizarPacientesDoDia(); }

    function gerarCalendario() {
        const ano = dataAtual.getFullYear();
        const mes = dataAtual.getMonth();
        document.getElementById('calMesAno').innerText = `${mesesNomes[mes].substring(0,3)}. de ${ano}`;
        const primeiroDiaMes = new Date(ano, mes, 1).getDay();
        const ultimoDiaMes = new Date(ano, mes + 1, 0).getDate();
        const ultimoDiaMesAnterior = new Date(ano, mes, 0).getDate();
        const grade = document.getElementById('calGradeDias');
        if (!grade) return;
        grade.innerHTML = '';

        for (let i = primeiroDiaMes; i > 0; i--) {
            const div = document.createElement('div');
            div.className = 'cal-dia outro-mes'; div.innerText = ultimoDiaMesAnterior - i + 1; grade.appendChild(div);
        }
        for (let dia = 1; dia <= ultimoDiaMes; dia++) {
            const div = document.createElement('div');
            div.className = 'cal-dia'; div.innerText = dia;
            const dataStringIso = `${ano}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
            if(dataSelecionada.getDate() === dia && dataSelecionada.getMonth() === mes && dataSelecionada.getFullYear() === ano) div.classList.add('selecionado');
            if (saidas.some(s => s.data === dataStringIso)) {
                const marcador = document.createElement('span');
                marcador.className = 'marcador'; div.appendChild(marcador);
            }
            div.onclick = () => selecionarDia(ano, mes, dia);
            grade.appendChild(div);
        }
    }

    function renderizarPacientesDoDia() {
        const dia = String(dataSelecionada.getDate()).padStart(2, '0');
        const mes = String(dataSelecionada.getMonth() + 1).padStart(2, '0');
        const ano = dataSelecionada.getFullYear();
        const dataFormatadaIso = `${ano}-${mes}-${dia}`;
        
        document.getElementById('dataSelecionadaTitulo').innerText = `${diasSemanaNomes[dataSelecionada.getDay()]}, ${dataSelecionada.getDate()} de ${mesesNomes[dataSelecionada.getMonth()]}`;

        const lista = document.getElementById('listaPacientesAgendados');
        if (!lista) return;
        const agendadosFiltrados = saidas.filter(s => s.data === dataFormatadaIso);
        
        if (agendadosFiltrados.length === 0) {
            lista.innerHTML = "<p style='text-align:center; color:#64748b; margin-top:40px;'>Nenhum evento para este dia.</p>";
            return;
        }
        
        lista.innerHTML = agendadosFiltrados.map(s => {
            const nomeEscapado = (s.nome || "").replace(/'/g, "\\'");
            return `
                <div class="card-saida-paciente">
                    <div class="card-saida-conteudo">
                        <h4>👤 ${s.nome}</h4>
                        <p><strong>Evento:</strong> Renovação de Receita / Saída</p>
                        ${s.links ? `<a href="${s.links}" target="_blank" class="link-drive">📁 Ver Receita</a>` : ''}
                    </div>
                    <div class="actions-wrapper">
                        <button class="btn-action" style="background: #452b14; color: #fbbf24; border: 1px solid rgba(251,191,36,0.2);" onclick="prepararEdicaoSaida('${s.id}')" title="Editar Agendamento">✏️</button>
                        <button class="btn-action" style="background: #4c1d1d; color: #f87171; border: 1px solid rgba(248,113,113,0.2);" onclick="excluirSaida('${s.id}', '${nomeEscapado}')" title="Excluir Agendamento">🗑️</button>
                    </div>
                </div>
            `;
        }).join('');
    } 

    function abrir(id) { document.getElementById(id).style.display = 'flex'; }

    function fechar(id) { 
        document.getElementById(id).style.display = 'none'; 
        if (id === 'modalNovaSaida') {
            document.getElementById('editSaidaId').value = "";
        }
    }

    function filtrar(hora, btn) { horaAtual = hora; document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderizar(); }
    function abrirGoogle(med) { if(med && med !== "undefined") window.open('https://www.google.com/search?q=bula+'+med, '_blank'); }

    async function excluirRegistro(id, nome) {
        if (confirm(`Deseja realmente excluir o cadastro de ${nome}?`)) {
            const { error } = await supabaseClient.from('pacientes').delete().eq('id', id);
            if (!error) { carregar(); }
            else { alert("Erro ao excluir: " + error.message); }
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        carregar();
    });
</script>
