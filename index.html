<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmed - Gestão de Medicamentos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --cor-azul: #009cd9;
            --bg: #121824; 
            --card-bg: #1e293b;
            --texto-p: #f8fafc;
            --texto-s: #94a3b8;
            --borda: #334155;
            --shadow-in: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05);
            --shadow-out: 5px 5px 15px rgba(0,0,0,0.4), -2px -2px 10px rgba(255,255,255,0.05);
        }

        body.modo-claro {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --texto-p: #1e293b;
            --texto-s: #64748b;
            --borda: #cbd5e1;
            --shadow-in: inset 2px 2px 5px rgba(0,0,0,0.08), inset -2px -2px 5px rgba(255,255,255,0.8);
            --shadow-out: 4px 4px 12px rgba(0,0,0,0.1), -2px -2px 8px rgba(255,255,255,0.9);
        }
        body.modo-claro .search-input,
        body.modo-claro .modal-content input,
        body.modo-claro .modal-content select,
        body.modo-claro .modal-content textarea,
        body.modo-claro .login-input { background: #f8fafc; color: #1e293b; }
        body.modo-claro .semana-col,
        body.modo-claro .col-esquerda,
        body.modo-claro .col-direita { background: #f1f5f9; }
        body.modo-claro .cal-dia { background: #e2e8f0; color: #1e293b; }
        body.modo-claro .time-selector { background: #e2e8f0; }
        body.modo-claro .time-btn { color: #475569; }
        body.modo-claro .time-btn.active { background: #fff; color: #1e293b; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        body.modo-claro .btn-action { background: #e2e8f0; color: #1e293b; }
        body.modo-claro .btn-bula { background: #dbeafe; color: #1e40af; border-color: rgba(30,64,175,0.2); }
        body.modo-claro .btn-edit { background: #fef3c7; color: #92400e; border-color: rgba(146,64,14,0.2); }
        body.modo-claro .btn-delete { background: #fee2e2; color: #991b1b; border-color: rgba(153,27,27,0.2); }
        body.modo-claro #loginScreen { background: var(--bg); }
        body.modo-claro .login-card { background: var(--card-bg); }
        body.modo-claro .switch { background: #cbd5e1; }
        body.modo-claro .switch.checked { background: #22c55e; }
        body.modo-claro .sidebar { background: #f8fafc; }
        body.modo-claro .sidebar-item { background: #fff; color: #1e293b; border-color: #e2e8f0; }
        body.modo-claro .sidebar-item:hover { background: #e0f2fe; border-color: rgba(0,156,217,0.3); }
        body.modo-claro .record-card { border-top-color: rgba(0,0,0,0.05); }
        body.modo-claro .add-btn { color: white; }
        body.modo-claro .toast { background: #ffffff; border-color: #e2e8f0; }
        body.modo-claro .toast-title { color: #1e293b; }
        body.modo-claro .modal-content { background: #ffffff; }
        body.modo-claro h1 { background: linear-gradient(135deg, #1e293b 0%, var(--cor-azul) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body.modo-claro .search-input-compacto { background: #f1f5f9; color: #1e293b; border-color: #cbd5e1; }
        body.modo-claro .relatorio-item { background: #f8fafc; border-color: #e2e8f0; color: #1e293b; }
        body.modo-claro .semana-med-item { background: #f1f5f9; }

        /* ===== TOAST SYSTEM ===== */
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { display: flex; align-items: flex-start; gap: 12px; background: #1e293b; border: 1px solid var(--borda); border-radius: 14px; padding: 14px 18px; min-width: 280px; max-width: 360px; position: relative; overflow: hidden; transform: translateX(120%); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.hide { transform: translateX(120%); opacity: 0; }
        .toast-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
        .toast-body { flex: 1; }
        .toast-title { font-weight: 700; font-size: 14px; color: var(--texto-p); margin-bottom: 2px; }
        .toast-msg { font-size: 13px; color: var(--texto-s); line-height: 1.4; }
        .toast-close { background: none; border: none; color: var(--texto-s); cursor: pointer; font-size: 18px; padding: 0; line-height: 1; flex-shrink: 0; transition: color 0.2s; }
        .toast-close:hover { color: white; }
        .toast-bar { position: absolute; bottom: 0; left: 0; height: 3px; border-radius: 0 0 14px 14px; animation: toastBar linear forwards; }
        .toast { position: relative; overflow: hidden; }
        .toast.success { border-left: 4px solid #22c55e; }
        .toast.success .toast-bar { background: #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.error .toast-bar { background: #ef4444; }
        .toast.warning { border-left: 4px solid #f97316; }
        .toast.warning .toast-bar { background: #f97316; }
        .toast.info { border-left: 4px solid var(--cor-azul); }
        .toast.info .toast-bar { background: var(--cor-azul); }
        @keyframes toastBar { from { width: 100%; } to { width: 0%; } }

        /* ===== ETIQUETAS E CONTROLE DE MEDICAÇÃO ===== */
        .etiquetas-abas { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid var(--borda); }
        .etiquetas-aba-btn { background: transparent; border: none; color: var(--texto-s); padding: 12px 16px; cursor: pointer; font-weight: 700; font-size: 13px; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .etiquetas-aba-btn:hover { color: var(--texto-p); }
        .etiquetas-aba-btn.ativa { color: var(--cor-azul); border-bottom-color: var(--cor-azul); }
        .etiquetas-aba-conteudo { display: none; }
        .etiquetas-aba-conteudo.ativa { display: block; }
        .etiquetas-tamanho-seletor { display: flex; gap: 12px; margin-bottom: 16px; }
        .etiquetas-tamanho-opcao { flex: 1; padding: 12px; border: 2px solid var(--borda); border-radius: 12px; background: transparent; cursor: pointer; font-weight: 600; color: var(--texto-s); transition: all 0.3s; }
        .etiquetas-tamanho-opcao:hover { border-color: var(--cor-azul); color: var(--cor-azul); }
        .etiquetas-tamanho-opcao.selecionado { border-color: var(--cor-azul); background: rgba(0,156,217,0.1); color: var(--cor-azul); }
        .contra-med-horario-item { margin-bottom: 14px; padding: 12px; background: #151f32; border-radius: 12px; }
        .contra-med-horario-item strong { display: block; margin-bottom: 8px; color: var(--cor-azul); }

        /* ===== Estilos existentes do projeto ===== */
        /* LOGIN SCREEN */
        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 1000000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--card-bg); border-radius: 28px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid var(--borda); }
        .login-logo { text-align: center; margin-bottom: 28px; }
        .login-logo img { max-width: 120px; border-radius: 12px; box-shadow: var(--shadow-out); }
        .login-title { text-align: center; font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #fff 0%, var(--cor-azul) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-subtitle { text-align: center; font-size: 13px; color: var(--texto-s); margin-bottom: 28px; }
        .login-label { font-size: 12px; color: var(--texto-s); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
        .login-input { width: 100%; padding: 13px 16px; border: 1px solid var(--borda); border-radius: 12px; background: #151f32; color: white; outline: none; font-size: 15px; box-shadow: var(--shadow-in); }
        .login-input:focus { border-color: var(--cor-azul); }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00b4ff, var(--cor-azul)); color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 15px; transition: all 0.3s; }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:active { transform: scale(0.98); }
        .login-error { color: #f87171; font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; }
        .login-shake { animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--texto-p); padding: 25px; min-height: 100vh; }
        .dashboard { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 25px; background: linear-gradient(135deg, #fff 0%, var(--cor-azul) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-input { flex: 1; padding: 14px 20px; border-radius: 16px; border: 1px solid var(--borda); background: #151f32; color: white; outline: none; font-size: 16px; box-shadow: var(--shadow-in); }
        .search-input:focus { border-color: var(--cor-azul); }
        .search-input::placeholder { color: #64748b; }
        .search-input-compacto { width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--borda); background: #1e293b; color: white; outline: none; font-size: 14px; box-shadow: var(--shadow-in); }
        .search-input-compacto:focus { border-color: var(--cor-azul); background: #151f32; }
        .search-input-compacto::placeholder { color: #64748b; font-size: 13px; }
        
        .add-btn { background: linear-gradient(135deg, #00b4ff, var(--cor-azul)); color: white; border: none; padding: 14px 25px; border-radius: 16px; cursor: pointer; font-weight: bold; font-size: 15px; transition: all 0.3s; }
        .add-btn:active { transform: scale(0.97); box-shadow: var(--shadow-in); }
        .add-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 10, 15, 0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 24px; width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); border: 1px solid var(--borda); max-height: 90vh; overflow-y: auto; }
        .modal-content h2 { margin-bottom: 15px; font-weight: 700; font-size: 22px; letter-spacing: -0.5px; }
        .modal-content label { font-size: 12px; color: var(--texto-s); font-weight: 600; text-transform: uppercase; }
        .modal-content input, .modal-content select, .modal-content textarea { width: 100%; margin: 8px 0 14px 0; padding: 12px 16px; border: 1px solid var(--borda); border-radius: 12px; background: #151f32; color: white; outline: none; font-size: 13px; }
        .modal-content input:focus, .modal-content select:focus, .modal-content textarea:focus { border-color: var(--cor-azul); }

        .top-nav { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; }
        .menu-toggle { background: var(--card-bg); color: var(--texto-p); border: 1px solid var(--borda); padding: 10px 15px; border-radius: 12px; font-size: 20px; cursor: pointer; box-shadow: var(--shadow-out); transition: all 0.3s; }
        .menu-toggle:active { transform: scale(0.95); box-shadow: var(--shadow-in); }

        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100vh; background-color: var(--bg); border-right: 1px solid var(--borda); z-index: 10000; transition: left 0.3s ease; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar.aberta { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 9999; display: none; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.ativa { display: block; opacity: 1; }
        .sidebar-header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borda); }
        .sidebar-header h2 { margin: 0; font-size: 1.4rem; color: var(--cor-azul); }
        .fechar-menu { background: none; border: none; color: var(--texto-s); font-size: 28px; cursor: pointer; transition: color 0.2s; }
        .fechar-menu:hover { color: white; }
        .sidebar-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .sidebar-item { background: var(--card-bg); padding: 16px 20px; border-radius: 16px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); font-weight: 600; color: var(--texto-p); display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .sidebar-item:hover { transform: translateY(-2px); background: #243147; border-color: rgba(0,156,217,0.3); }
        .sidebar-item:active { transform: translateY(1px); box-shadow: var(--shadow-in); }

        @media (max-width: 768px) {
            .dashboard { padding: 10px; width: 100%; }
            .modal-content { width: 95% !important; margin: 10px auto !important; padding: 20px !important; }
        }
    </style>
</head>
<body>
   
<!-- ===== TOAST CONTAINER ===== -->
<div id="toast-container"></div>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">
            <img src="https://lh3.googleusercontent.com/d/1BIAepPrrliHft2rnjcCdQxAWu0icfL2y" alt="Logo Farmed">
        </div>
        <div class="login-title">Farmed</div>
        <div class="login-subtitle">Gestão de Medicamentos</div>
        <label class="login-label">Login</label>
        <input type="text" id="loginUsuario" class="login-input" placeholder="ex: maria.silva" autocomplete="username" onkeydown="if(event.key==='Enter') document.getElementById('loginSenha').focus()">
        <label class="login-label" style="margin-top:12px;">Senha</label>
        <input type="password" id="loginSenha" class="login-input" placeholder="insira sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter') tentarLogin()">
        <button class="login-btn" onclick="tentarLogin()">Entrar</button>
        <div class="login-error" id="loginErro"></div>
    </div>
</div>

<div class="dashboard">
    <div style="text-align: center; margin-bottom: 10px; margin-top: 10px;">
        <img src="https://lh3.googleusercontent.com/d/1BIAepPrrliHft2rnjcCdQxAWu0icfL2y" alt="Logo Farmed" style="max-width: 150px; height: auto; border-radius: 12px; box-shadow: var(--shadow-out);">
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between; background:var(--card-bg, #151f32); border-radius:14px; padding:10px 16px; margin-bottom:14px; border:1px solid var(--borda);">
        <span id="headerUsuarioLogado" style="font-weight:700; font-size:14px;">👤 —</span>
        <button onclick="logout()" style="background:none; border:none; color:#f87171; font-weight:600; font-size:13px; cursor:pointer;">🔒 Sair</button>
    </div>

    <div class="top-nav">
        <button class="menu-toggle" onclick="abrirMenuLateral()">&#9776;</button>
        <input type="text" id="searchInput" class="search-input" placeholder="&#128269; Procurar por acolhido ou medicamento..." onkeyup="renderizar()">
    </div>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="fecharMenuLateral()"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>⚙️ Ações</h2>
            <button onclick="fecharMenuLateral()" class="fechar-menu">×</button>
        </div>
        
        <div class="sidebar-body">
            <button class="add-btn" id="btnTriggerCadastro" onclick="abrirCadastroNovos(); fecharMenuLateral();" style="width: 100%;">+ Registar Novo</button>
            <div class="sidebar-item" onclick="abrirModalEtiquetas(); fecharMenuLateral();">🏷️ Etiquetas & Controle</div>
            <div class="sidebar-item" onclick="logout()" style="color: #f87171;">🔒 Terminar Sessão</div>
        </div>
    </div>

    <div id="lista-registros">A carregar dados...</div>
</div>

<!-- ===== MODAL ETIQUETAS E CONTROLE ===== -->
<div id="modalEtiquetas" class="modal">
    <div class="modal-content" style="max-width: 600px; width: 95%;">
        <h2>🏷️ Etiquetas & Controle de Medicação</h2>
        
        <div class="etiquetas-abas">
            <button class="etiquetas-aba-btn ativa" data-aba="abaEtiquetas">📋 Etiquetas</button>
            <button class="etiquetas-aba-btn" data-aba="abaControleMedicacao">📝 Controle Medicação</button>
        </div>

        <!-- ABA ETIQUETAS -->
        <div id="abaEtiquetas" class="etiquetas-aba-conteudo ativa">
            <label>Selecione um Acolhido:</label>
            <select id="etiquetaAcolhidoSelect" onchange="aoSelecionarAcolhidoEtiqueta()">
                <option value="">-- Selecione um Acolhido --</option>
            </select>

            <label>Nome:</label>
            <input type="text" id="etiquetaNome" readonly>

            <label>Data de Nascimento:</label>
            <input type="text" id="etiquetaDataNascimento" readonly>

            <label>CPF:</label>
            <input type="text" id="etiquetaCPF" readonly>

            <label>Horários:</label>
            <div id="etiquetaHorariosContainer" style="margin-bottom: 14px; padding: 8px; background: #151f32; border-radius: 8px; color: var(--texto-s); font-size: 13px;"></div>

            <label>Tamanho da Etiqueta:</label>
            <div class="etiquetas-tamanho-seletor">
                <button class="etiquetas-tamanho-opcao selecionado" onclick="document.getElementById('etiquetaTamanho').value='grande'; document.querySelectorAll('.etiquetas-tamanho-opcao').forEach(b => b.classList.remove('selecionado')); this.classList.add('selecionado');">
                    Grande<br>(9,6cm × 5,6cm)
                </button>
                <button class="etiquetas-tamanho-opcao" onclick="document.getElementById('etiquetaTamanho').value='pequeno'; document.querySelectorAll('.etiquetas-tamanho-opcao').forEach(b => b.classList.remove('selecionado')); this.classList.add('selecionado');">
                    Pequeno<br>(14,6cm × 1,7cm)
                </button>
            </div>
            <input type="hidden" id="etiquetaTamanho" value="grande">

            <button onclick="gerarPdfEtiqueta()" style="width:100%; padding:14px; background:linear-gradient(135deg, #00b4ff, var(--cor-azul)); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:700; margin-top:10px;">📄 Gerar PDF da Etiqueta</button>
            <button onclick="fechar('modalEtiquetas')" style="width:100%; padding:12px; margin-top:10px; border:none; background:#151f32; color:var(--texto-s); border-radius:12px; cursor:pointer; font-weight:600;">Fechar</button>
        </div>

        <!-- ABA CONTROLE DE MEDICAÇÃO -->
        <div id="abaControleMedicacao" class="etiquetas-aba-conteudo">
            <label>Selecione um Acolhido:</label>
            <select id="contraMedAcolhidoSelect" onchange="aoSelecionarAcolhidoContraMed()">
                <option value="">-- Selecione um Acolhido --</option>
            </select>

            <label>Nome do Acolhido:</label>
            <input type="text" id="contraMedNome" readonly>

            <label>Medicamento(s):</label>
            <input type="text" id="contraMedMedicamentos" readonly>

            <label>Horários:</label>
            <div id="contraMedHorarios" style="margin-bottom: 14px; max-height: 200px; overflow-y: auto;"></div>

            <button onclick="gerarPdfControleMedicacao()" style="width:100%; padding:14px; background:linear-gradient(135deg, #00b4ff, var(--cor-azul)); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:700; margin-top:10px;">📄 Gerar Controle (PDF - Paisagem A4)</button>
            <button onclick="fechar('modalEtiquetas')" style="width:100%; padding:12px; margin-top:10px; border:none; background:#151f32; color:var(--texto-s); border-radius:12px; cursor:pointer; font-weight:600;">Fechar</button>
        </div>
    </div>
</div>

<script src="modulo-etiquetas.js"></script>
<script>
    // Funções auxiliares básicas
    function abrir(idModal) {
        const modal = document.getElementById(idModal);
        if (modal) {
            modal.style.display = 'flex';
            if (idModal === 'modalEtiquetas') {
                setTimeout(() => inicializarAbasEtiquetas(), 100);
                atualizarListaAcolhidosEtiquetas();
            }
        }
    }

    function fechar(idModal) {
        const modal = document.getElementById(idModal);
        if (modal) {
            modal.style.display = 'none';
        }
    }

    function mostrarToast(titulo, tipo = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${tipo}`;
        
        const icones = { success: '✓', error: '✕', warning: '!', info: 'ℹ' };
        
        toast.innerHTML = `
            <span class="toast-icon">${icones[tipo]}</span>
            <div class="toast-body">
                <div class="toast-title">${titulo}</div>
            </div>
        `;
        
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            toast.classList.add('hide');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function abrirMenuLateral() {
        document.getElementById('sidebar').classList.add('aberta');
        document.getElementById('sidebarOverlay').classList.add('ativa');
    }

    function fecharMenuLateral() {
        document.getElementById('sidebar').classList.remove('aberta');
        document.getElementById('sidebarOverlay').classList.remove('ativa');
    }

    function abrirCadastroNovos() {
        mostrarToast('Abra o modal de cadastro', 'info');
    }
